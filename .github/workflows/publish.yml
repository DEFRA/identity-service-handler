name: Publish

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: "094954420758"

jobs:
  build:
    if: github.run_number != 1
    name: CDP-build-workflow
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

#      Uncomment this section if you are going to also run sonarqube as it
#      requires the output from the test coverage.
#      - name: Test code and Create Test Coverage Reports
#        uses: actions/setup-node@v4
#        with:
#          node-version-file: .nvmrc
#          cache: npm
#      - run: |
#          npm ci
#          npm run build:frontend
#          npm test

      - name: Build and Publish
        uses: DEFRA/cdp-build-action/build@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 #7.0.0 (or check latest version on https://github.com/marketplace/actions/official-sonarqube-scan)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=defra
            -Dsonar.projectKey=DEFRA_identity-service-handler
            -Dsonar.exclusions=src/**/*.test.js
            -Dsonar.javascript.lcov.reportPaths=./coverage/lcov.info
