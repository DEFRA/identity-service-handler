services:
  localstack:
    image: localstack/localstack:3.0.2
    ports:
      - '4566:4566' # LocalStack Gateway
      - '4510-4559:4510-4559' # external services port range
    env_file:
      - 'compose/aws.env'
    environment:
      DEBUG: ${DEBUG:-1}
      LS_LOG: WARN # Localstack DEBUG Level
      SERVICES: s3,sqs,sns,firehose
      LOCALSTACK_HOST: 127.0.0.1
    volumes:
      - '${TMPDIR:-/tmp}/localstack:/var/lib/localstack'
      - ./compose/start-localstack.sh:/etc/localstack/init/ready.d/start-localstack.sh
    healthcheck:
      test: ['CMD', 'curl', 'localhost:4566/_localstack/health']
      interval: 5s
      start_period: 5s
      retries: 3
    networks:
      - identity-services

  redis:
    image: redis:7.2.3-alpine3.18
    ports:
      - '6379:6379'
    restart: always
    networks:
      - identity-services

  mongodb:
    image: mongo:6.0.13
    networks:
      - identity-services
    ports:
      - '27017:27017'
    volumes:
      - mongodb-data:/data
    restart: always

  identity-service-handler:
    build:
      context: ./
      target: ${NODE_ENV:-development}
    platform: linux
    ports:
      - '${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}'
    links:
      - 'localstack:localstack'
      - 'redis:redis'
    depends_on:
      localstack:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - path: 'compose/aws.env'
        required: true
      - path: 'compose/identity-service-handler.env'
        required: false
    environment:
      PORT: ${FRONTEND_PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_HOST: redis
      LOCALSTACK_ENDPOINT: http://localstack:4566
      USE_SINGLE_INSTANCE_CACHE: true
      USE_FAKE_EXTERNAL_API: ${HELPER_USE_FAKE_CLIENT:-true}
      HELPER_BASEURL: ${HELPER_BASEURL:-http://localhost:3001}
      HELPER_API_KEY: ${HELPER_API_KEY:-your-helper-api-key}
      B2C_CLIENT_ID: ${B2C_CLIENT_ID:-your-default-client-id}
      B2C_CLIENT_SECRET: ${B2C_CLIENT_SECRET}
      B2C_SERVICE_ID: ${B2C_SERVICE_ID:-your-default-service-id}
      DEBUG: ${DEBUG}
      NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS}
      OIDC_SIGNING_CERT: ${OIDC_SIGNING_CERT}
      OIDC_SIGNING_KEY: ${OIDC_SIGNING_KEY}
      SESSION_COOKIE_PASSWORD: ${SESSION_COOKIE_PASSWORD}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      TLS_ENABLED: ${TLS_ENABLED:-true}
      BROKER_BASE_URL2: ${BROKER_BASE_URL2:-https://identity-service-handler.dev.cdp-int.defra.cloud/}
      BROKER_REDIRECT_URL2: ${BROKER_REDIRECT_URL2:-https://fakelocal}
    networks:
      - identity-services
volumes:
  mongodb-data:

networks:
  identity-services:
    driver: bridge
